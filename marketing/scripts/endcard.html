<!doctype html><html><head><meta charset="utf-8"><style>
  :root{ --canvas:#0e0e11; --surface:#1a1b20; --accent:#5cccaa; --muted:#8a8d96; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; overflow:hidden;
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
    background:var(--canvas); color:#fff; -webkit-font-smoothing:antialiased; }
  .stage{ position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:0; }
  .glow{ position:absolute; top:540px; left:50%; transform:translateX(-50%);
    width:900px; height:900px; border-radius:50%;
    background:radial-gradient(circle, rgba(92,204,170,.20) 0%, rgba(92,204,170,.06) 38%, transparent 66%);
    filter:blur(8px); }
  .icon{ width:248px; height:248px; border-radius:56px; object-fit:cover;
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.06);
    position:relative; }
  .dots{ display:flex; gap:14px; align-items:center; margin-top:54px; }
  .dots span{ width:10px; height:10px; border-radius:50%; background:var(--accent); }
  .title{ font-size:78px; font-weight:700; letter-spacing:-1.5px; margin-top:40px; position:relative; }
  .tag{ font-size:38px; font-weight:500; color:var(--accent); margin-top:18px; position:relative; }
  .steps{ position:absolute; bottom:150px; left:0; right:0; text-align:center;
    font-size:25px; font-weight:600; letter-spacing:7px; color:var(--muted); text-transform:uppercase; }
</style></head><body>
  <div class="glow"></div>
  <div class="stage">
    <img class="icon" src="REPLACE_ICON">
    <div class="dots">
      <span style="opacity:.18"></span><span style="opacity:.32"></span><span style="opacity:.5"></span>
      <span style="opacity:.7"></span><span style="opacity:1"></span>
    </div>
    <div class="title">Motion Trails</div>
    <div class="tag">Turn motion into trails</div>
  </div>
  <div class="steps">Record &nbsp;·&nbsp; Tune &nbsp;·&nbsp; Share</div>
</body></html>
